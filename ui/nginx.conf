server {
    listen 80;
    server_name _;

    # SPA fallback — every unknown path returns index.html so client-side routing works.
    root /usr/share/nginx/html;
    index index.html;
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Spring gateway. Path is rewritten so the gateway sees /orders/123 not /api/orders/123.
    location /api/ {
        proxy_pass http://gateway:8080/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # OpenFeature Remote Evaluation Protocol — flagd's HTTP endpoint.
    # Browser hits same-origin /ofrep/v1/evaluate/flags/<key>; nginx forwards to flagd:8016.
    location /ofrep/ {
        proxy_pass http://flagd:8016/ofrep/;
        proxy_set_header Host $host;
        proxy_buffering off;            # SSE streams aren't buffered
        proxy_read_timeout 1h;          # OFREP polling/SSE keeps connections open
    }
}
