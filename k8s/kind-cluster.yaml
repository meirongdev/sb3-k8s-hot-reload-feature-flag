kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: sb3-demo
nodes:
  - role: control-plane
    kubeadmConfigPatches:
      - |
        kind: KubeletConfiguration
        configMapAndSecretChangeDetectionStrategy: Watch
        syncFrequency: 10s
    extraPortMappings:
      - containerPort: 31080      # gateway NodePort
        hostPort: 31080
        protocol: TCP
      - containerPort: 31180      # ui (nginx) NodePort
        hostPort: 31180
        protocol: TCP
  - role: worker
